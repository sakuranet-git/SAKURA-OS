    <style>
        :root {
            --accent: #e91e63;
            --accent-glow: rgba(233,30,99,0.3);
            --panel-bg: rgba(255,255,255,0.02);
            --panel-border: rgba(255,255,255,0.55);
            --taskbar-bg: rgba(5,4,12,0.75);
            --win-header: rgba(18,14,30,0.98);
            --win-body: rgba(10,8,18,0.98);
            --win-border: rgba(233,30,99,0.3);
            --win-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(233,30,99,0.2);
            --win-active-shadow: 0 28px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(233,30,99,0.5);
            --text: #ffffff;
            --text-dim: #f0edf5;
            --text-muted: rgba(240,237,245,0.78);
            --btn-close: #ff5f57;
            --btn-min: #febc2e;
            --btn-max: #28c840;
            --radius: 14px;
            --radius-sm: 10px;
            --tr: 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        [data-theme="light"] {
            --panel-bg: rgba(255,255,255,0.72);
            --panel-border: rgba(0,0,0,0.08);
            --taskbar-bg: rgba(255,255,255,0.92);
            --win-header: rgba(250,249,255,0.98);
            --win-body: rgba(255,255,255,0.98);
            --win-border: rgba(233,30,99,0.25);
            --win-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(233,30,99,0.12);
            --win-active-shadow: 0 16px 48px rgba(0,0,0,0.18), 0 0 0 1px rgba(233,30,99,0.35);
            --text: #18162a;
            --text-dim: rgba(24,22,42,0.72);
            --text-muted: rgba(24,22,42,0.42);
            --accent-glow: rgba(233,30,99,0.15);
        }
        [data-theme="light"] #desktop-wallpaper {
            background: linear-gradient(135deg,#f8f0ff 0%,#fce4ec 40%,#e8eaf6 100%) !important;
        }
        [data-theme="light"] #news-ticker {
            background: rgba(200,10,40,0.82);
        }
        [data-theme="light"] .tb-icon-btn {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.12);
            color: #18162a;
        }
        [data-theme="light"] .tb-icon-btn:hover {
            background: rgba(233,30,99,0.1);
            color: var(--accent);
        }
        [data-theme="light"] .tb-win-btn {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.1);
            color: var(--text-dim);
        }
        [data-theme="light"] .tb-win-btn:hover { background:rgba(233,30,99,0.08); color:var(--text); }
        [data-theme="light"] .tb-win-btn.active { background:rgba(233,30,99,0.15); border-color:var(--accent); }
        [data-theme="light"] .lp-app-item:hover { background:rgba(0,0,0,0.06); border-color:rgba(0,0,0,0.1); }
        [data-theme="light"] .currency-card, [data-theme="light"] .news-card {
            background: rgba(255,255,255,0.82);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        [data-theme="light"] .news-card:hover { border-color:rgba(233,30,99,0.3); box-shadow:0 4px 20px rgba(233,30,99,0.1); }
        [data-theme="light"] #tb-user { background:rgba(0,0,0,0.05); border-color:rgba(0,0,0,0.1); }
        [data-theme="light"] .tb-logout { border-color:rgba(200,30,60,0.3); background:rgba(200,30,60,0.06); color:rgba(180,20,50,0.9); }
        [data-theme="light"] #wallpaper-panel { background:rgba(255,255,255,0.88); }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width:100%; height:100%; overflow:hidden; font-family:'Outfit','Noto Sans JP',sans-serif; }
        body { user-select:none; -webkit-user-select:none; color: var(--text); text-shadow:0 1px 6px rgba(0,0,0,0.9); }

        /* ── Wallpaper ── */
        #desktop-wallpaper {
            position:fixed; inset:0; z-index:0;
            background: linear-gradient(135deg,#0c0a14 0%,#1a0a24 50%,#0a0a1e 100%);
            background-size:cover; background-position:center; background-repeat:no-repeat;
            transition: background 0.6s ease;
        }
        #desktop-wallpaper::after {
            content:''; position:absolute; inset:0; pointer-events:none;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(233,30,99,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 75%, rgba(124,58,237,0.05) 0%, transparent 50%);
        }

        /* ── News Ticker ── */
        #news-ticker {
            position:fixed; top:0; left:0; right:0; height:32px; z-index:8500;
            display:flex; align-items:center; overflow:hidden;
            background: rgba(190,10,30,0.86);
            backdrop-filter:blur(8px);
            border-bottom:1px solid rgba(255,120,120,0.2);
        }
        .ticker-label {
            flex-shrink:0; padding:0 14px; height:100%; display:flex; align-items:center;
            font-size:13px; font-weight:700; color:#fff; letter-spacing:0.5px; gap:5px;
            background:rgba(255,255,255,0.12); border-right:1px solid rgba(255,255,255,0.15);
        }
        .ticker-scroll-wrap { flex:1; overflow:hidden; height:100%; display:flex; align-items:center; }
        .ticker-track {
            display:inline-flex; align-items:center; white-space:nowrap;
            animation:ticker 90s linear infinite;
        }
        .ticker-track:hover { animation-play-state:paused; }
        @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
        .ticker-item { font-size:14px; color:rgba(255,255,255,0.9); font-weight:500; padding:0 28px 0 0; }
        .ticker-item::before { content:'●'; margin-right:8px; font-size:10px; opacity:0.6; }

        /* ── Left Panel ── */
        #left-panel {
            position:fixed; left:0; top:32px; bottom:48px; width:272px; z-index:50;
            background:transparent;
            border-right:1px solid var(--panel-border);
            display:flex; flex-direction:column; overflow-y:auto; overflow-x:hidden;
            scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.08) transparent;
        }
        #left-panel::-webkit-scrollbar { width:3px; }
        #left-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }

        /* Clock */
        .lp-clock { padding:20px 20px 14px; border-bottom:1px solid var(--panel-border); }
        .clock-hm { font-size:58px; font-weight:800; letter-spacing:-2px; line-height:1; color:var(--text); font-variant-numeric:tabular-nums; text-shadow:0 2px 16px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,0.8); }
        .clock-sec { font-size:26px; font-weight:300; opacity:0.5; margin-left:1px; }
        .clock-date { margin-top:8px; font-size:13px; font-weight:500; color:var(--text-dim); text-shadow:0 1px 8px rgba(0,0,0,1); }
        .clock-meta { margin-top:3px; font-size:11px; color:var(--text-muted); display:flex; gap:10px; }
        .clock-loc { margin-top:5px; font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }

        /* Weather */
        .lp-weather { padding:16px 20px 14px; border-bottom:1px solid var(--panel-border); }
        .wx-main { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .wx-icon { font-size:38px; }
        .wx-temp { font-size:38px; font-weight:700; color:var(--text); line-height:1; text-shadow:0 2px 12px rgba(0,0,0,1); }
        .wx-unit { font-size:16px; font-weight:400; opacity:0.6; }
        .wx-desc { font-size:12px; color:var(--text-dim); font-weight:500; margin-top:2px; }
        .wx-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px 12px; margin-bottom:12px; }
        .wx-stat-lbl { font-size:10px; color:var(--text-muted); font-weight:500; }
        .wx-stat-val { font-size:13px; color:var(--text-dim); font-weight:600; }
        .wx-forecast { display:flex; flex-direction:column; gap:7px; }
        .wx-fc-row { display:flex; align-items:center; justify-content:space-between; font-size:12px; }
        .wx-fc-day { color:var(--text-dim); font-weight:600; min-width:42px; }
        .wx-fc-icon { font-size:14px; }
        .wx-fc-rain { font-size:11px; color:rgba(100,160,255,0.7); min-width:36px; text-align:center; }
        .wx-fc-temps { color:var(--text); font-weight:600; font-size:12px; }
        .wx-fc-low { color:var(--text-muted); font-weight:400; }

        /* App list - Mac style */
        .lp-section-title { padding:12px 20px 6px; font-size:10px; font-weight:700; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }
        .lp-apps { padding:8px 10px 12px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .lp-app-item { display:flex; flex-direction:column; align-items:center; gap:5px; padding:8px 4px 6px; border-radius:14px; cursor:pointer; transition:background var(--tr),transform var(--tr); border:1px solid transparent; }
        .lp-app-item:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.12); }
        .lp-app-item:active { transform:scale(0.88); }
        .lp-app-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2); position:relative; overflow:hidden; }
        .lp-app-icon::after { content:''; position:absolute; inset:0; background:linear-gradient(160deg,rgba(255,255,255,0.18) 0%,transparent 55%); border-radius:inherit; pointer-events:none; }
        .lp-app-name { font-size:10px; font-weight:600; color:var(--text); text-align:center; line-height:1.3; text-shadow:0 1px 4px rgba(0,0,0,0.8); }

        /* Mascot Toggle (left panel) */
        .lp-mascot-row { padding:10px 20px 14px; border-top:1px solid var(--panel-border); }
        .lp-mascot-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:12px; color:var(--text-dim); user-select:none; }
        .lp-mascot-knob { width:36px; height:20px; border-radius:10px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18); position:relative; transition:background var(--tr),border-color var(--tr); flex-shrink:0; }
        .lp-mascot-knob::after { content:''; position:absolute; top:3px; left:3px; width:12px; height:12px; border-radius:50%; background:#fff; transition:transform var(--tr); }
        #mascot-knob[data-on="1"] { background:var(--accent); border-color:var(--accent); }
        #mascot-knob[data-on="1"]::after { transform:translateX(16px); }

        /* ── Info Area ── */
        #info-area {
            position:fixed; left:272px; top:32px; bottom:48px; right:0; z-index:10; overflow:hidden;
        }
        .currency-row { position:absolute; top:18px; right:20px; display:flex; gap:12px; z-index:11; }
        .currency-card {
            background:transparent;
            border:2px solid rgba(255,255,255,0.6); border-radius:var(--radius); padding:14px 18px; min-width:155px;
        }
        .cur-pair { font-size:10px; font-weight:700; color:var(--text-muted); letter-spacing:0.4px; margin-bottom:6px; }
        .cur-rate { font-size:26px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; text-shadow:0 1px 10px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,0.8); }
        .cur-unit { font-size:13px; font-weight:400; opacity:0.55; }
        .cur-change { font-size:11px; font-weight:600; margin-top:3px; }
        .cur-change.up { color:#4ade80; }
        .cur-change.dn { color:#f87171; }
        .cur-load { color:var(--text-muted); font-size:11px; }

        .news-grid {
            position:absolute; top:104px; left:14px; right:14px;
            display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,110px); gap:8px; z-index:11;
        }
        .news-card {
            background:transparent;
            border:2px solid rgba(255,255,255,0.55); border-radius:var(--radius); padding:12px 14px;
            display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; cursor:pointer;
            transition:border-color var(--tr), background var(--tr), transform var(--tr);
            user-select:text; -webkit-user-select:text;
        }
        .news-card:hover { border-color:rgba(233,30,99,0.4); background:rgba(233,30,99,0.06); transform:translateY(-2px); }
        .news-src { font-size:12px; font-weight:700; color:#f06292; letter-spacing:0.3px; margin-bottom:6px; }
        .news-title { font-size:14px; font-weight:700; color:var(--text); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; flex:1; text-shadow:0 1px 8px rgba(0,0,0,1); }
        .news-time { font-size:12px; color:var(--text-muted); margin-top:8px; }

        /* ── Desktop Calendar + Tasks ── */
        #dcal-wrapper {
            position:absolute; top:464px; left:14px; right:14px; z-index:11;
            display:flex; gap:12px; align-items:flex-start;
        }
        #desktop-calendar {
            width:330px; flex-shrink:0;
            background:transparent;
            border:2px solid rgba(255,255,255,0.55); border-radius:var(--radius); padding:16px;
        }
        .dcal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
        .dcal-title { font-size:16px; font-weight:700; color:var(--text); }
        .dcal-nav { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:17px; padding:2px 7px; border-radius:6px; transition:color var(--tr), background var(--tr); }
        .dcal-nav:hover { color:var(--text); background:rgba(255,255,255,0.08); }
        .dcal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center; }
        .dcal-dn { font-size:12px; font-weight:700; color:var(--text-muted); padding:3px 0 7px; }
        .dcal-dn.sun { color:rgba(255,100,100,0.7); }
        .dcal-dn.sat { color:rgba(100,150,255,0.7); }
        .dcal-cell { font-size:14px; font-weight:600; color:var(--text-dim); padding:6px 2px; border-radius:7px; cursor:pointer; position:relative; transition:background var(--tr), color var(--tr); }
        .dcal-cell:hover { background:rgba(255,255,255,0.08); color:var(--text); }
        .dcal-cell.sun { color:rgba(255,120,120,0.8); }
        .dcal-cell.sat { color:rgba(120,160,255,0.8); }
        .dcal-cell.today { background:var(--accent); color:#fff !important; font-weight:800; }
        .dcal-cell.today:hover { background:var(--accent); filter:brightness(1.1); }
        .dcal-cell.today .dcal-dot { background:#fff; }
        .dcal-cell.selected:not(.today) { background:rgba(233,30,99,0.2); color:var(--text); }
        .dcal-dot { width:4px; height:4px; background:var(--accent); border-radius:50%; position:absolute; bottom:2px; left:50%; transform:translateX(-50%); }
        /* Tasks panel */
        #dcal-tasks {
            flex:1; min-width:0;
            background:transparent;
            border:2px solid rgba(255,255,255,0.55); border-radius:var(--radius); padding:14px;
        }
        .dcal-tasks-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .dcal-tasks-title { font-size:15px; font-weight:700; color:var(--text); text-shadow:0 1px 8px rgba(0,0,0,1); }
        .dcal-tasks-count { font-size:13px; font-weight:700; color:var(--accent); background:rgba(233,30,99,0.12); border-radius:10px; padding:2px 8px; }
        .dcal-task-item { padding:8px 10px; border-radius:8px; border:1.5px solid rgba(255,255,255,0.4); background:transparent; margin-bottom:6px; cursor:pointer; transition:background var(--tr), border-color var(--tr); }
        .dcal-task-item:hover { background:rgba(233,30,99,0.08); border-color:rgba(233,30,99,0.3); }
        .dcal-task-item:last-child { margin-bottom:0; }
        .dcal-task-time { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:3px; }
        .dcal-task-name { font-size:14px; font-weight:700; color:var(--text); text-shadow:0 1px 8px rgba(0,0,0,1); }
        .dcal-task-type { font-size:12px; color:var(--text-muted); margin-left:4px; }
        .dcal-task-addr { font-size:13px; color:var(--text-dim); margin-top:3px; }
        .dcal-tasks-empty { font-size:14px; color:var(--text-muted); text-align:center; padding:16px 0; }
        .dcal-tasks-loading { font-size:13px; color:var(--text-muted); text-align:center; padding:12px 0; }

        /* ── Windows ── */
        #windows-container { position:fixed; left:0; top:32px; right:0; bottom:48px; z-index:100; pointer-events:none; }
        #windows-container .os-window { pointer-events:auto; }
        #drag-blocker { display:none; position:fixed; inset:0; z-index:9000; cursor:default; }
        #drag-blocker.active { display:block; }

        .os-window {
            position:absolute; display:flex; flex-direction:column;
            border-radius:var(--radius); border:1px solid var(--win-border); box-shadow:var(--win-shadow);
            overflow:hidden; min-width:320px; min-height:200px;
            transition:box-shadow 0.15s, border-color 0.15s;
            animation:winOpen 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes winOpen { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
        .os-window.focused { box-shadow:var(--win-active-shadow); border-color:rgba(233,30,99,0.5); }
        .os-window.maximized { border-radius:0!important; border:none!important; }
        .os-window.minimized { display:none; }
        .win-header { height:38px; background:var(--win-header); display:flex; align-items:center; padding:0 12px; gap:10px; cursor:move; flex-shrink:0; border-bottom:1px solid rgba(255,255,255,0.04); }
        .win-controls { display:flex; gap:6px; flex-shrink:0; }
        .win-btn { width:13px; height:13px; border-radius:50%; border:none; cursor:pointer; transition:filter var(--tr), transform var(--tr); }
        .win-btn:hover { filter:brightness(1.25); transform:scale(1.15); }
        .win-btn.close   { background:var(--btn-close); }
        .win-btn.minimize{ background:var(--btn-min); }
        .win-btn.maximize{ background:var(--btn-max); }
        .win-title { flex:1; font-size:12px; font-weight:600; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .win-iframe { flex:1; border:none; background:var(--win-body); display:block; width:100%; }
        .win-resize { position:absolute; right:0; bottom:0; width:18px; height:18px; cursor:se-resize; }
        .win-resize::after { content:''; position:absolute; right:4px; bottom:4px; width:8px; height:8px; border-right:2px solid rgba(255,255,255,0.15); border-bottom:2px solid rgba(255,255,255,0.15); }

        /* ── Taskbar ── */
        #taskbar {
            position:fixed; bottom:0; left:0; right:0; height:48px; z-index:8000;
            background:var(--taskbar-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
            border-top:1px solid var(--panel-border);
            display:flex; align-items:center; padding:0 12px; gap:8px;
        }
        #tb-logo { display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:var(--radius-sm); font-weight:800; font-size:13px; background:linear-gradient(135deg,var(--accent),#7c3aed); color:#fff; cursor:pointer; flex-shrink:0; transition:filter var(--tr), transform var(--tr); }
        #tb-logo:hover { filter:brightness(1.15); transform:scale(1.03); }
        #tb-logo span { font-size:16px; }
        #tb-windows { flex:1; display:flex; align-items:center; gap:4px; overflow-x:auto; scrollbar-width:none; }
        #tb-windows::-webkit-scrollbar { display:none; }
        .tb-win-btn { display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:var(--text-dim); cursor:pointer; font-size:12px; font-family:inherit; font-weight:500; white-space:nowrap; transition:all var(--tr); max-width:160px; }
        .tb-win-btn:hover { background:rgba(255,255,255,0.1); color:var(--text); }
        .tb-win-btn.active { background:var(--accent-glow); border-color:var(--accent); color:var(--text); }
        .tb-win-btn.minimized { opacity:0.5; }
        .tb-win-btn .tb-icon { font-size:14px; }
        .tb-win-btn .tb-label { overflow:hidden; text-overflow:ellipsis; max-width:100px; }
        #tb-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

<script>
// ── App definitions ──
const APPS = [
    { id:'customer',  name:'顧客管理',     icon:'📋', color:'linear-gradient(145deg,#1e6fe8,#0d47c8)', url:'/system/ordersystem.html',        w:1200, h:720 },
    { id:'hikari',    name:'申込み管理',   icon:'📝', color:'linear-gradient(145deg,#2dc96e,#159a46)', url:'/system/sakuranethikari.html',     w:1100, h:680 },
    { id:'usage',     name:'利用明細',     icon:'📊', color:'linear-gradient(145deg,#9b59e8,#6b2fb8)', url:'/system/usagelog.html',            w:1050, h:660 },
    { id:'call',      name:'通話明細',     icon:'📞', color:'linear-gradient(145deg,#17b8d4,#0d7fa0)', url:'/system/calllog.html',             w:1050, h:660 },
    { id:'ai',        name:'SAKURA AI',    icon:'🤖', color:'linear-gradient(145deg,#e91e7a,#b0004e)', url:'/system/sakura-ai/',               w:960,  h:700 },
    { id:'music',     name:'SAKURA MUSIC', icon:'🎵', color:'linear-gradient(145deg,#ff7a20,#d44a00)', url:'/system/sakuramusic/music.html',   w:820,  h:580 },
    { id:'groupware', name:'グループウェア',icon:'🏢', color:'linear-gradient(145deg,#5c6bc0,#3748a8)', url:'/system/groupware.html',           w:1400, h:820 },
];

const WALLPAPERS = [
    { id:'sakura-dark',  label:'SAKURA ダーク',  bg:'linear-gradient(135deg,#0c0a14 0%,#1a0a24 50%,#0a0a1e 100%)', preview:'linear-gradient(135deg,#0c0a14,#1a0a24)' },
    { id:'midnight',     label:'ミッドナイト',    bg:'linear-gradient(135deg,#060812 0%,#0e1840 50%,#06080e 100%)', preview:'linear-gradient(135deg,#060812,#0e1840)' },
    { id:'deep-ocean',   label:'ディープオーシャン', bg:'linear-gradient(135deg,#040c1a 0%,#082040 40%,#021018 100%)', preview:'linear-gradient(135deg,#040c1a,#082040)' },
    { id:'forest',       label:'フォレスト',      bg:'linear-gradient(135deg,#050d06 0%,#0a200e 50%,#030806 100%)', preview:'linear-gradient(135deg,#050d06,#0a200e)' },
    { id:'aurora',       label:'オーロラ',        bg:'linear-gradient(135deg,#040510 0%,#081520 35%,#051e14 70%,#0d0510 100%)', preview:'linear-gradient(135deg,#040510,#081520,#051e14)' },
    { id:'sakura-night', label:'SAKURA ナイト',   bg:'linear-gradient(135deg,#120010 0%,#1e0018 50%,#0c0010 100%)', preview:'linear-gradient(135deg,#120010,#1e0018)' },
    { id:'cosmos',       label:'コスモス',        bg:'linear-gradient(135deg,#050508 0%,#0a0a20 40%,#150515 100%)', preview:'linear-gradient(135deg,#050508,#0a0a20,#150515)' },
    { id:'ember',        label:'エンバー',        bg:'linear-gradient(135deg,#100606 0%,#261410 50%,#0e0604 100%)', preview:'linear-gradient(135deg,#100606,#261410)' },
    { id:'silver',       label:'シルバー',        bg:'linear-gradient(135deg,#080a10 0%,#102030 50%,#060810 100%)', preview:'linear-gradient(135deg,#080a10,#102030)' },
];

// ── State ──
let zCounter = 100, currentUser = '---', activeWindowId = null;
const savedPos = {};
let currentWpId = 'sakura-dark';
let wpTimer = null, wpSlideIdx = 0, wpSlideshowOn = false, wpSlideshowSec = 30;
let wpUploads = []; // [{ dataUrl, name }]

// ── IndexedDB ヘルパー（LocalStorageの5MB制限を回避するため壁紙保存に使用）──
const WallpaperDB = {
    _DB_NAME: 'sakura_os_wallpapers',
    _DB_STORE: 'wallpapers',
    _DB_VERSION: 1,
    _openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(this._DB_NAME, this._DB_VERSION);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(this._DB_STORE)) {
                    db.createObjectStore(this._DB_STORE, { keyPath: 'key' });
                }
            };
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = () => reject(req.error);
        });
    },
    async save(key, data) {
        const db = await this._openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(this._DB_STORE, 'readwrite');
            tx.objectStore(this._DB_STORE).put({ key, data });
            tx.oncomplete = () => resolve(true);
            tx.onerror = () => reject(tx.error);
        });
    },
    async load(key) {
        const db = await this._openDB();
        return new Promise((resolve) => {
            const tx = db.transaction(this._DB_STORE, 'readonly');
            const req = tx.objectStore(this._DB_STORE).get(key);
            req.onsuccess = () => resolve(req.result ? req.result.data : null);
            req.onerror = () => resolve(null);
        });
    }
};

// ── Init ──
async function init() {
    const savedTheme = localStorage.getItem('sakura_os_theme') || 'dark';
    setTheme(savedTheme);

    // アップロード一覧をIndexedDBからロード（旧LocalStorageからの自動移行）
    try {
        let saved = await WallpaperDB.load('uploads');
        if (!saved) {
            const legacy = localStorage.getItem('sakura_os_wp_uploads');
            if (legacy) {
                saved = JSON.parse(legacy);
                await WallpaperDB.save('uploads', saved);
                localStorage.removeItem('sakura_os_wp_uploads');
            }
        }
        if (Array.isArray(saved)) wpUploads = saved;
    } catch {}

    const savedWp = localStorage.getItem('sakura_os_wp');
    if (savedWp) {
        try {
            const w = JSON.parse(savedWp);
            if (w.id === 'upload') {
                // アップロード画像はwpUploadsから復元（二重保存なし）
                const idx = (typeof w.uploadIdx === 'number' && wpUploads[w.uploadIdx]) ? w.uploadIdx : 0;
                if (wpUploads.length > 0) applyWp(wpUploads[idx].dataUrl, 'upload');
                else applyWp(WALLPAPERS[0].bg, WALLPAPERS[0].id);
            } else {
                applyWp(w.bg, w.id);
            }
        }
        catch { applyWp(WALLPAPERS[0].bg, WALLPAPERS[0].id); }
    } else {
        applyWp(WALLPAPERS[0].bg, WALLPAPERS[0].id);
    }

    try {
        const res = await fetch('gw_api.php?module=user', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ action:'me' })
        });
        const data = await res.json();
        if (data.user && data.user.id) {
            currentUser = data.user.name || data.user.id;
        } else {
            location.href = 'index.php'; return;
        }
    } catch { location.href = 'index.php'; return; }

    document.getElementById('tb-user').textContent = currentUser;
    renderApps();
    renderWpGrid();
    renderUploadList();
    renderDesktopCalendar();
    renderDcalTasks(new Date());
    initFirestoreCalendar();
    startClock();
    fetchWeather();
    fetchNews();
    fetchCurrency();
    loadSlideSettings();
    hideLoading();
}

function hideLoading() {
    const el = document.getElementById('loading-overlay');
    el.classList.add('hidden');
    setTimeout(() => el.remove(), 500);
}

// ── App List ──
function renderApps() {
    const c = document.getElementById('lp-apps');
    APPS.forEach(app => {
        const el = document.createElement('div');
        el.className = 'lp-app-item';
        el.innerHTML = `<span class="lp-app-icon" style="background:${app.color}">${app.icon}</span><span class="lp-app-name">${app.name}</span>`;

// ── Clock ──
const DAYS = ['日','月','火','水','木','金','土'];
const JUNISHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const JIKKAN  = ['庚','辛','壬','癸','甲','乙','丙','丁','戊','己'];

function getEra(y, mo, d) {
    if (y > 2019 || (y === 2019 && mo >= 5)) return '令和' + (y - 2018) + '年';
    return y + '年';
}
function getKanshi(y) {
    const jikkan  = JIKKAN [(y - 2020 + 100) % 10];
    const junishi = JUNISHI[(y - 2020 + 120) % 12];
    return jikkan + junishi;
}

function startClock() {
    // DOM要素を一度だけ取得してキャッシュ（毎秒クエリしないように）
    const elHm   = document.getElementById('lp-hm');
    const elDate = document.getElementById('lp-date');
    const elMeta = document.getElementById('lp-meta');
    const elTb   = document.getElementById('tb-clock');
    function tick() {
        const n = new Date();
        const h = String(n.getHours()).padStart(2,'0');
        const m = String(n.getMinutes()).padStart(2,'0');
        const s = String(n.getSeconds()).padStart(2,'0');
        const y = n.getFullYear(), mo = n.getMonth()+1, d = n.getDate();
        elHm.innerHTML = `${h}:${m}<span class="clock-sec">:${s}</span>`;
        elDate.textContent = `${y}年 ${mo}月 ${d}日 (${DAYS[n.getDay()]})`;
        elMeta.innerHTML = `<span>${getEra(y,mo,d)}</span><span>干支 ${getKanshi(y)}</span>`;
        elTb.textContent = `${h}:${m}`;
    }
    tick();
    setInterval(tick, 1000);
}

// ── News (Yahoo! Japan — multi-proxy, no NHK fallback) ──
async function fetchNews() {
    const YAHOO_URLS = [
        'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
        'https://news.yahoo.co.jp/pickup/rss.xml',
        'https://news.yahoo.co.jp/rss/topics/domestic.xml',
        'https://news.yahoo.co.jp/rss/topics/world.xml',
    ];
    const mkProxy = [
        u => 'https://corsproxy.io/?' + encodeURIComponent(u),
        u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
        u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    ];

    let newsItems = [];

    // --- Phase 1: rss2json (JSON, no XML parse needed) ---
    for (const rssUrl of YAHOO_URLS) {
        if (newsItems.length > 0) break;
        try {
            const res  = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl));
            const data = await res.json();
            if (data.status === 'ok' && data.items?.length > 0) {
                newsItems = data.items.map(it => ({
                    title: it.title || '',
                    link:  it.link  || '#',
                    pub:   it.pubDate || '',
                }));
            }
        } catch { /* next */ }
    }

    // --- Phase 2: raw XML via CORS proxies ---
    if (newsItems.length === 0) {
        outer: for (const rssUrl of YAHOO_URLS) {
            for (const proxy of mkProxy) {
                try {
                    const res  = await fetch(proxy(rssUrl));
                    const txt  = await res.text();
                    const xml  = new DOMParser().parseFromString(txt, 'text/xml');
                    if (xml.querySelector('parsererror')) continue;
                    const found = Array.from(xml.querySelectorAll('item'));
                    if (found.length > 0) {
                        newsItems = found.map(it => ({
                            title: it.querySelector('title')?.textContent || '',
                            link:  it.querySelector('link')?.textContent  || '#',
                            pub:   it.querySelector('pubDate')?.textContent || '',
                        }));
                        break outer;
                    }
                } catch { /* next */ }
            }
        }
    }

    const srcLabel = 'Yahoo! ニュース';

    // Ticker
    const tickerHtml = newsItems.slice(0,10).map(it =>
        `<span class="ticker-item">${it.title}</span>`
    ).join('');
    document.getElementById('ticker-track').innerHTML =
        tickerHtml ? tickerHtml + tickerHtml : '<span class="ticker-item">ニュースを読み込み中...</span>';

    // Grid — 9 tiles (3×3)
    const grid = document.getElementById('news-grid');
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
        const card = document.createElement('div');
        card.className = 'news-card';
        if (newsItems.length > 0) {
            const it = newsItems[i % newsItems.length];
            card.innerHTML = `<div class="news-src">${srcLabel}</div><div class="news-title">${it.title}</div><div class="news-time">${fmtDate(it.pub)}</div>`;
            card.addEventListener('click', () => window.open(it.link, '_blank'));
        } else {
            card.innerHTML = `<div class="news-src" style="opacity:.3">---</div>`;
        }
        grid.appendChild(card);
    }
}

function fmtDate(s) {
    try {
        const d = new Date(s);
        return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } catch { return s; }
}

// ── Window System ──
function openApp(app) {
    const wid = 'win-' + app.id;
    const ex  = document.getElementById(wid);
    if (ex) {
        if (ex.classList.contains('minimized')) ex.classList.remove('minimized');
        bringToFront(wid); updateTaskbar(); return;
    }
    const n = Object.keys(savedPos).length % 8;
    const left = Math.max(290, Math.min(290 + n*24, window.innerWidth - app.w - 20));
    const top  = Math.max(10,  Math.min(20 + n*24, window.innerHeight - app.h - 80));
    const win  = document.createElement('div');
    win.className = 'os-window'; win.id = wid;
    win.style.cssText = `left:${left}px;top:${top}px;width:${app.w}px;height:${app.h}px;z-index:${++zCounter};`;
    win.innerHTML = `
        <div class="win-header" id="hdr-${app.id}">
            <div class="win-controls">
                <button class="win-btn close"    onclick="closeWin('${app.id}')"></button>
                <button class="win-btn minimize" onclick="minimizeWin('${app.id}')"></button>
                <button class="win-btn maximize" onclick="maximizeWin('${app.id}')"></button>
            </div>
            <div class="win-title">${app.icon} ${app.name}</div>
        </div>
        <iframe class="win-iframe" src="${app.url}" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads allow-modals" loading="lazy"></iframe>
        <div class="win-resize" id="rsz-${app.id}"></div>`;
    document.getElementById('windows-container').appendChild(win);
    savedPos[app.id] = null;
    setupDrag(app.id); setupResize(app.id);
    bringToFront(wid); updateTaskbar();
}

function closeWin(id) {
    const w = document.getElementById('win-'+id); if (!w) return;
    w.style.transition = 'opacity .15s, transform .15s';
    w.style.opacity = '0'; w.style.transform = 'scale(0.92)';
    setTimeout(() => { w.remove(); delete savedPos[id]; updateTaskbar(); }, 150);
}
function minimizeWin(id) {
    const w = document.getElementById('win-'+id); if (!w) return;
    w.classList.add('minimized');
    if (activeWindowId === 'win-'+id) activeWindowId = null;
    updateTaskbar();
}
function maximizeWin(id) {
    const w = document.getElementById('win-'+id); if (!w) return;
    if (w.classList.contains('maximized')) {
        w.classList.remove('maximized');
        const p = savedPos[id];
        if (p) { w.style.left=p.left; w.style.top=p.top; w.style.width=p.width; w.style.height=p.height; }
    } else {
        savedPos[id] = { left:w.style.left, top:w.style.top, width:w.style.width, height:w.style.height };
        w.classList.add('maximized');
        w.style.left='0'; w.style.top='0'; w.style.width='100vw'; w.style.height='calc(100vh - 80px)';
    }
}
function bringToFront(wid) {
    const w = document.getElementById(wid); if (!w) return;
    w.style.zIndex = ++zCounter;
    document.querySelectorAll('.os-window').forEach(x => x.classList.remove('focused'));
    w.classList.add('focused'); activeWindowId = wid; updateTaskbar();
}

// ── Drag ──
function setupDrag(id) {
    const hdr = document.getElementById('hdr-'+id);
    const win = document.getElementById('win-'+id);
    if (!hdr || !win) return;
    hdr.addEventListener('mousedown', e => {
        if (e.target.classList.contains('win-btn')) return;
        if (win.classList.contains('maximized')) return;
        bringToFront('win-'+id);
        const sx = e.clientX - win.offsetLeft, sy = e.clientY - win.offsetTop;
        document.getElementById('drag-blocker').classList.add('active');
        const mv = ev => { win.style.left=(ev.clientX-sx)+'px'; win.style.top=Math.max(0,ev.clientY-sy)+'px'; };
        const up = () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.getElementById('drag-blocker').classList.remove('active'); };
        document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });
}

// ── Resize ──
function setupResize(id) {
    const h = document.getElementById('rsz-'+id);
    const w = document.getElementById('win-'+id);
    if (!h || !w) return;
    h.addEventListener('mousedown', e => {
        e.preventDefault();
        if (w.classList.contains('maximized')) return;
        bringToFront('win-'+id);
        const sx=e.clientX, sy=e.clientY, sw=w.offsetWidth, sh=w.offsetHeight;
        document.getElementById('drag-blocker').classList.add('active');
        const mv = ev => { w.style.width=Math.max(320,sw+ev.clientX-sx)+'px'; w.style.height=Math.max(200,sh+ev.clientY-sy)+'px'; };
        const up = () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); document.getElementById('drag-blocker').classList.remove('active'); };
        document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });
}
document.getElementById('windows-container').addEventListener('mousedown', e => {
    const w = e.target.closest('.os-window'); if (w) bringToFront(w.id);
});

// ── Taskbar ──
function updateTaskbar() {
    const c = document.getElementById('tb-windows');
    c.innerHTML = '';
    document.querySelectorAll('.os-window').forEach(win => {
        const id = win.id.replace('win-','');
        const app = APPS.find(a => a.id === id); if (!app) return;
        const btn = document.createElement('button');
        btn.className = 'tb-win-btn';
        if (win.classList.contains('minimized')) btn.classList.add('minimized');
        if (win.id === activeWindowId) btn.classList.add('active');
        btn.innerHTML = `<span class="tb-icon">${app.icon}</span><span class="tb-label">${app.name}</span>`;
        btn.addEventListener('click', () => {
            if (win.classList.contains('minimized')) { win.classList.remove('minimized'); bringToFront(win.id); }
            else if (win.id === activeWindowId) { minimizeWin(id); }
            else { bringToFront(win.id); }
        });
        c.appendChild(btn);
    });
}

function applyWp(bg, id, fade) {
    const el = document.getElementById('desktop-wallpaper');
    const doApply = () => {
        if (bg.startsWith('http') || bg.startsWith('data:') || bg.match(/^(\/|\.)/)) {
            el.style.background = `url(${bg}) center/cover no-repeat`;
        } else {
            el.style.background = bg;
            el.style.backgroundSize = 'cover';
        }
        if (fade) {
            el.style.opacity = '1';
        }
    };
    if (fade) {
        el.style.transition = 'opacity 0.8s ease';
        el.style.opacity = '0';
        setTimeout(doApply, 800);
    } else {
        el.style.transition = 'background 0.6s ease';
        el.style.opacity = '1';
        doApply();
    }
    currentWpId = id || 'custom';
    // アップロード画像はwpUploadsに既に保存済みのため、インデックスだけ保存（二重保存でストレージ超過を防ぐ）
    if (currentWpId === 'upload') {
        const idx = wpUploads.findIndex(u => u.dataUrl === bg);
        try { localStorage.setItem('sakura_os_wp', JSON.stringify({ id: 'upload', uploadIdx: idx >= 0 ? idx : 0 })); } catch { showToast('⚠️ ストレージ容量不足'); }
    } else {
        try { localStorage.setItem('sakura_os_wp', JSON.stringify({ bg, id: currentWpId })); } catch { showToast('⚠️ ストレージ容量不足'); }
    }
    document.querySelectorAll('.wp-swatch').forEach(s => s.classList.remove('active'));
    const active = document.getElementById('wps-' + currentWpId);
    if (active) active.classList.add('active');
}

function applyCustomWp() {
    const v = document.getElementById('wp-url').value.trim();
    if (!v) return;
    applyWp(v, 'custom');
    showToast('🖼️ 壁紙を変更しました');
}

// ── アップロード壁紙（複数対応・IndexedDB永続保存）──
function saveUploads() {
    WallpaperDB.save('uploads', wpUploads).catch(e => {
        console.warn('壁紙データの保存に失敗:', e);
        showToast('⚠️ 壁紙データの保存に失敗しました');
    });
}

function readFileAsDataUrl(file) {
    return new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.readAsDataURL(file);
    });
}

async function addFileWp(input) {
    const files = Array.from(input.files);
    input.value = '';
    for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        const dataUrl = await readFileAsDataUrl(file);
        wpUploads.push({ dataUrl, name: file.name });
    }
    saveUploads();
    renderUploadList();
    if (wpUploads.length > 0) {
        const last = wpUploads[wpUploads.length - 1];
        applyWp(last.dataUrl, 'upload');
        showToast(`🖼️ ${files.length}枚追加しました`);
    }
    if (wpSlideshowOn) startSlideshow();
}

function deleteUploadedWp(idx) {
    wpUploads.splice(idx, 1);
    saveUploads();
    renderUploadList();
    if (wpSlideshowOn && wpUploads.length === 0) { stopSlideshow(); showToast('⏹️ 画像がないのでスライドショーを停止しました'); }
    else if (wpSlideshowOn) startSlideshow();
    // 現在表示中の壁紙が削除されたらデフォルトへ
    if (currentWpId === 'upload' && wpUploads.length === 0) {
        applyWp(WALLPAPERS[0].bg, WALLPAPERS[0].id);
    }
    showToast('🗑️ 削除しました');
}

function renderUploadList() {
    const list = document.getElementById('wp-upload-list');
    if (!list) return;
    list.innerHTML = '';
    wpUploads.forEach((u, i) => {
        const item = document.createElement('div');
        item.className = 'wp-upload-item' + (currentWpId === 'upload' && wpSlideIdx === i ? ' active' : '');
        item.innerHTML = `
            <img class="wp-upload-thumb" src="${u.dataUrl}" alt="">
            <span class="wp-upload-name">${u.name}</span>
            <button class="wp-upload-del" onclick="event.stopPropagation();deleteUploadedWp(${i})" title="削除">✕</button>
        `;
        item.addEventListener('click', () => { applyWp(u.dataUrl, 'upload'); renderUploadList(); showToast('🖼️ 壁紙を変更しました'); });
        list.appendChild(item);
    });
}

(function initWpDrop() {
    document.addEventListener('DOMContentLoaded', () => {
        const zone = document.getElementById('wp-drop-zone');
        if (!zone) return;
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
        zone.addEventListener('drop', async e => {
            e.preventDefault();
            zone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length === 0) { showToast('⚠️ 画像ファイルを指定してください'); return; }
            for (const file of files) {
                const dataUrl = await readFileAsDataUrl(file);
                wpUploads.push({ dataUrl, name: file.name });
            }
            saveUploads();
            renderUploadList();
            const last = wpUploads[wpUploads.length - 1];
            applyWp(last.dataUrl, 'upload');
            showToast(`🖼️ ${files.length}枚追加しました`);
            if (wpSlideshowOn) startSlideshow();
        });
    });
})();

// ── スライドショー（SAKURA AIと同ロジック・アップロード画像対象）──
function startSlideshow() {
    if (wpTimer) clearInterval(wpTimer);
    if (wpUploads.length === 0) { showToast('⚠️ 先に画像をアップロードしてください'); return; }
    wpSlideIdx = wpSlideIdx % wpUploads.length;
    const cycle = () => {
        const u = wpUploads[wpSlideIdx];
        applyWp(u.dataUrl, 'upload', true); // フェード付き
        wpSlideIdx = (wpSlideIdx + 1) % wpUploads.length;
        renderUploadList();
    };
    wpTimer = setInterval(cycle, wpSlideshowSec * 1000);
    document.getElementById('wp-slide-indicator').classList.add('active');
}

function stopSlideshow() {
    if (wpTimer) { clearInterval(wpTimer); wpTimer = null; }
    document.getElementById('wp-slide-indicator').classList.remove('active');
}

function toggleSlideshow(on) {
    if (on && wpUploads.length === 0) {
        showToast('⚠️ 先に画像をアップロードしてください');
        document.getElementById('wp-slide-on').checked = false;
        return;
    }
    wpSlideshowOn = on;
    saveSlideSettings();
    if (on) { startSlideshow(); showToast('🔄 スライドショー開始'); }
    else    { stopSlideshow();  showToast('⏹️ スライドショー停止'); }
}

function setSlideshowInterval(sec) {
    wpSlideshowSec = sec;
    saveSlideSettings();
    if (wpSlideshowOn) startSlideshow(); // 再起動して間隔反映
}

function saveSlideSettings() {
    try { localStorage.setItem('sakura_os_slide', JSON.stringify({ on: wpSlideshowOn, sec: wpSlideshowSec })); } catch {}
}

function loadSlideSettings() {
    try {
        const s = JSON.parse(localStorage.getItem('sakura_os_slide') || 'null');
        if (!s) return;
        wpSlideshowOn = s.on || false;
        wpSlideshowSec = s.sec || 30;
        const cb  = document.getElementById('wp-slide-on');
        const sel = document.getElementById('wp-slide-sec');
        if (cb)  cb.checked = wpSlideshowOn;
        if (sel) sel.value  = wpSlideshowSec;
        if (wpSlideshowOn) startSlideshow();
    } catch {}
}

// ── Desktop Calendar + Tasks (Firestore連携) ──
let dcalDate = new Date();
let dcalSelectedDate = null; // null = 今日
let customerRecords  = [];
let dcalFsReady      = false;

// 定例予定（ordersystem.htmlと同ロジック）
function dcalGetRecurring(year, month, day) {
    const tasks = [];
    if (day ===  2) tasks.push({ name:'イオンカード引き落とし',              taskType:'定例引落', timeWorkStart:'', timeWorkEnd:'', address:'-' });
    if (day === 10) tasks.push({ name:'ドコモ・三井住友・メルカリカード・引落', taskType:'定例引落', timeWorkStart:'', timeWorkEnd:'', address:'-' });
    if (day === 25) tasks.push({ name:'自動車保険',                          taskType:'定例引落', timeWorkStart:'', timeWorkEnd:'', address:'-' });
    if (day === 27) tasks.push({ name:'楽天・PayPayカード・ペイディ引落',     taskType:'定例引落', timeWorkStart:'', timeWorkEnd:'', address:'-' });
    return tasks;
}

function dcalDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}/${m}/${d}`;  // YYYY/MM/DD
}

function dcalGetTasksFor(date) {
    const t1 = dcalDateStr(date);
    const t2 = t1.replace(/\//g, '-');
    const from_fs = customerRecords.filter(r => {
        const dw = String(r.dateWork || '').trim();
        return dw === t1 || dw === t2;
    });
    const recurring = dcalGetRecurring(date.getFullYear(), date.getMonth(), date.getDate());
    return [...from_fs, ...recurring];
}

function dcalHasTask(year, month, day) {
    const date = new Date(year, month, day);
    return dcalGetTasksFor(date).length > 0;
}

function renderDesktopCalendar() {
    const year  = dcalDate.getFullYear();
    const month = dcalDate.getMonth();
    const today = new Date();
    document.getElementById('dcal-title').textContent = `${year}年 ${month + 1}月`;
    const firstDay    = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const dayNames = ['日','月','火','水','木','金','土'];
    const dayClass = ['sun','','','','','','sat'];
    let html = dayNames.map((d,i) => `<div class="dcal-dn ${dayClass[i]}">${d}</div>`).join('');
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    const selStr = dcalSelectedDate ? dcalDateStr(dcalSelectedDate) : dcalDateStr(today);
    for (let d = 1; d <= daysInMonth; d++) {
        const dow      = (firstDay + d - 1) % 7;
        const isToday  = year === today.getFullYear() && month === today.getMonth() && d === today.getDate();
        const dateObj  = new Date(year, month, d);
        const isSel    = dcalDateStr(dateObj) === selStr;
        const hasDot   = dcalHasTask(year, month, d);
        const cls      = ['dcal-cell', dayClass[dow], isToday ? 'today' : '', isSel && !isToday ? 'selected' : ''].filter(Boolean).join(' ');
        const dateS    = dcalDateStr(dateObj);
        html += `<div class="${cls}" onclick="dcalSelectDate('${dateS}')">${d}${hasDot ? '<div class="dcal-dot"></div>' : ''}</div>`;
    }
    document.getElementById('dcal-grid').innerHTML = html;
}

function dcalSelectDate(dateStr) {
    const parts = dateStr.split('/');
    dcalSelectedDate = new Date(+parts[0], +parts[1] - 1, +parts[2]);
    renderDesktopCalendar();
    renderDcalTasks(dcalSelectedDate);
}

function renderDcalTasks(date) {
    const today = new Date();
    const isToday = date.getFullYear() === today.getFullYear() &&
                    date.getMonth()    === today.getMonth()    &&
                    date.getDate()     === today.getDate();
    const m = date.getMonth() + 1, d = date.getDate();
    document.getElementById('dcal-tasks-title').textContent =
        isToday ? '🎯 本日の作業予定' : `🗓 ${m}月${d}日の作業予定`;

    if (!dcalFsReady) {
        document.getElementById('dcal-tasks-list').innerHTML = '<div class="dcal-tasks-loading">読み込み中...</div>';
        return;
    }
    const tasks = dcalGetTasksFor(date);
    document.getElementById('dcal-tasks-count').textContent = `${tasks.length}件`;
    const list = document.getElementById('dcal-tasks-list');
    if (tasks.length === 0) {
        list.innerHTML = '<div class="dcal-tasks-empty">作業予定はありません 🎉</div>';
        return;
    }
    list.innerHTML = tasks.map(t => {
        const time = t.timeWorkStart ? `⏰ ${t.timeWorkStart}〜${t.timeWorkEnd || ''}` : '⏰ 時間未設定';
        const addr = (t.address && t.address !== '-') ? `<div class="dcal-task-addr">📍 ${t.address}</div>` : '';
        return `<div class="dcal-task-item">
            <div class="dcal-task-time">${time}</div>
            <div><span class="dcal-task-name">${t.name}</span><span class="dcal-task-type">${t.taskType ? '(' + t.taskType + ')' : ''}</span></div>
            ${addr}
        </div>`;
    }).join('');
}

function dcalMove(dir) {
    dcalDate.setMonth(dcalDate.getMonth() + dir);
    renderDesktopCalendar();
}

function initFirestoreCalendar() {
    const unsubscribe = _fsDb.collection('customer_records').onSnapshot(
        (snapshot) => {
            customerRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            dcalFsReady = true;
            renderDesktopCalendar();
            renderDcalTasks(dcalSelectedDate || new Date());
        },
        (err) => {
            console.warn('Firestore読み込みエラー:', err.message);
            dcalFsReady = true;
            renderDcalTasks(dcalSelectedDate || new Date());
        }
    );
    // ページ離脱時にリスナーを解除してメモリ解放
    window.addEventListener('beforeunload', unsubscribe, { once: true });
}

// ── Theme ──
function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
    localStorage.setItem('sakura_os_theme', t);
}
function toggleTheme() {
    const t = document.documentElement.getAttribute('data-theme');
    setTheme(t === 'dark' ? 'light' : 'dark');
    showToast(t === 'dark' ? '☀️ ライトモード' : '🌙 ダークモード');
}

// ── Logout ──
function doLogout() { location.href = 'index.php?logout=1'; }

// ── Toast ──
let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Mascot Toggle ──
function toggleMascotDisplay() {
    if (window.sakuraMascot) window.sakuraMascot.toggle();
    updateMascotKnob();
}
function updateMascotKnob() {
    const knob = document.getElementById('mascot-knob');
    if (!knob) return;
    const isOn = localStorage.getItem('sakura_mascot_off') !== 'true';
    knob.setAttribute('data-on', isOn ? '1' : '0');
}

// ── Boot ──
document.addEventListener('DOMContentLoaded', () => { init(); updateMascotKnob(); });
</script>
<script src="/system/SAKURA-NET-Mascot/mascot.js"></script>
